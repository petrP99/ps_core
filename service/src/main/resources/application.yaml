keycloak:
  base-url: http://localhost:8081
  realm: psproject
  admin-username: admin
  admin-password: admin
  client-id: psproject-frontend
  client-secret: ""

spring:
  application:
    name: PSproject
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/psproject
          jwk-set-uri: http://localhost:8081/realms/psproject/protocol/openid-connect/certs

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      connect-timeout: 2000
      timeout: 1000

  datasource:
    url: jdbc:postgresql://localhost:5432/payments_system
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        show_sql: false
        format_sql: true
        highlight_sql: true
        hbm2ddl.auto: validate
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    topics:
      transfer-create: ps-transfer-create
      account-close: ps-account-close
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: transfer:com.pers.dto.request.TransferRequestDto,accountClose:com.pers.dto.event.AccountCloseEvent
    consumer:
      group-id: ps-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.type.mapping: transfer:com.pers.dto.request.TransferRequestDto,accountClose:com.pers.dto.event.AccountCloseEvent
        spring.json.trusted.packages: "com.pers.*, transfer"

  logging:
    level:
      org:
        springframework:
          security: TRACE

value:
  exchangeRate:
    url: https://v6.exchangerate-api.com/v6/19c0929c9d29445d4cc474aa/latest/RUB
  comission: 0.5
